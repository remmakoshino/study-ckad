# MongoDB Helmfile Values（カスタムChart用）
replicaCount: 1

image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent

auth:
  rootUsername: admin
  rootPassword: mongopassword
  database: taskdb

persistence:
  enabled: true
  storageClass: standard
  size: 1Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
