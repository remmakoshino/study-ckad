# MongoDB Helmfile Values（カスタムChart用）
replicaCount: 1

image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent

# 認証情報はSOPS暗号化ファイル (secrets/mongodb-secrets.yaml) で管理
# ★ パスワードはvaluesにハードコードしないでください
auth:
  # rootUsername / rootPassword は secrets/mongodb-secrets.yaml から注入
  database: taskdb

persistence:
  enabled: true
  storageClass: standard
  size: 1Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
