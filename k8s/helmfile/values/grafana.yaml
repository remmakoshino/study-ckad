# Grafana 追加設定（Prometheus Stack内蔵のGrafanaに上書き）
# 個別にGrafana Chartを使用する場合のvaluesファイル
# 認証情報はSOPS暗号化ファイル (secrets/grafana-secrets.yaml) で管理
# adminUser / adminPassword は secrets/grafana-secrets.yaml から注入
# adminUser: <SOPS encrypted>
# adminPassword: <SOPS encrypted>

persistence:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-kube-prometheus-prometheus:9090
        access: proxy
        isDefault: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
