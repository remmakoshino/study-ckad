# ==============================================
# CKAD学習ポイント:
# - Deployment: RollingUpdate戦略
# - Liveness/Readiness Probe
# - Resource Requests/Limits
# - SecurityContext
# - 環境変数 (ConfigMap/Secretからの参照)
# - Init Container (DB接続待機)
# ==============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "backend.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "backend.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      # Init Container: MongoDBへの接続を待機
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "MongoDBの起動を待機中..."
              until nc -z mongodb 27017; do
                echo "MongoDB未起動... 3秒後にリトライ"
                sleep 3
              done
              echo "MongoDBに接続可能になりました"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Liveness Probe: コンテナが生存しているか確認
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness Probe: トラフィックを受け入れ可能か確認
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: 3
            failureThreshold: 3
          # リソース制限 (CKAD重要: requests/limits)
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # セキュリティコンテキスト
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # 環境変数: ConfigMapから参照
          envFrom:
            - configMapRef:
                name: {{ include "backend.fullname" . }}-config
          # 環境変数: Secretから参照
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "backend.fullname" . }}-secret
                  key: mongodb-uri
