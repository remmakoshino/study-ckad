# Frontend Helm Chart デフォルト値
replicaCount: 2

image:
  repository: study-ckad-frontend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: study-ckad.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  VITE_API_URL: "/api/v1"

serviceAccount:
  create: true
  name: frontend-sa
  annotations: {}

securityContext:
  runAsNonRoot: false
  readOnlyRootFilesystem: false
