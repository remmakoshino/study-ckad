# Frontend Helm Chart デフォルト値
replicaCount: 2

image:
  repository: study-ckad-frontend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    # OAuth2 Proxy 認証設定（auth_request パターン）
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.default.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "http://study-ckad.local/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Access-Token"
  hosts:
    - host: study-ckad.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  VITE_API_URL: "/api/v1"

serviceAccount:
  create: true
  name: frontend-sa
  annotations: {}

securityContext:
  runAsNonRoot: false
  readOnlyRootFilesystem: false
