# Harbor Container Registry 設定
# Minikube環境向け（学習用）
expose:
  type: nodePort
  tls:
    enabled: false

externalURL: http://core.harbor.local

harborAdminPassword: Harbor12345

# 学習環境のため永続化を無効化
persistence:
  enabled: false

# Trivy脆弱性スキャナー（リソース節約のため無効）
trivy:
  enabled: false

# プロジェクト名（イメージのpush先）
project: study-ckad
