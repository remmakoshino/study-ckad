# MongoDB Helm Chart デフォルト値
replicaCount: 1

image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 27017

# 認証情報はSOPS暗号化シークレットで管理
# Helmfile経由の場合: secrets/mongodb-secrets.yaml から注入
# ★ デフォルト値は開発用。本番環境では必ずSOPSで暗号化した値を使用してください
auth:
  rootUsername: ""
  rootPassword: ""
  database: taskdb

persistence:
  enabled: true
  storageClass: standard
  size: 1Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
