# CKAD学習ポイント: Secret - 機密情報の管理（OAuth2 Proxy認証情報）
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oauth2-proxy.fullname" . }}
  labels:
    {{- include "oauth2-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ .Values.config.clientID | quote }}
  client-secret: {{ .Values.config.clientSecret | quote }}
  cookie-secret: {{ .Values.config.cookieSecret | quote }}
