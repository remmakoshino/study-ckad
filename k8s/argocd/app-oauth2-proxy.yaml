# ==============================================
# ArgoCD Application: OAuth2 Proxy (認証プロキシ)
# Git リポジトリの状態をクラスタに自動同期
# ==============================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth2-proxy
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: study-ckad
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: study-ckad

  source:
    # ★ ここをご自身のリポジトリURLに変更してください
    repoURL: https://github.com/YOUR_USERNAME/study-ckad.git
    targetRevision: main
    path: k8s/charts/oauth2-proxy
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
